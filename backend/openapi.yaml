openapi: "3.0.3"
info:
  title: Burs Eşleştirme Sistemi API
  description: |
    Backend API for the scholarship matching system.
    All endpoints return JSON. Date fields are ISO 8601.
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local development (direct)
  - url: http://host.docker.internal:8080
    description: Local development (Docker)

paths:
  # ── Auth ────────────────────────────────────────────
  /register:
    post:
      summary: Yeni kullanıcı kaydet
      description: |
        Supabase Auth üzerinden kullanıcı oluşturur, email'i otomatik onaylar
        ve profiles tablosuna kaydı ekler.
        Öğrenciye ait alanlar (şehir, departman, GPA vb.) opsiyoneldir;
        kayıt anında girilebileceği gibi sonradan PUT /students/{profile_id} ile de eklenebilir.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Yönetici kaydı yapılamaz
        "409":
          description: Bu email zaten kayıtlı
        "500":
          description: Kullanıcı oluşturulamadı veya profil kaydedilemedi

  /login:
    post:
      summary: Kullanıcı girişi
      description: |
        Email ve şifre ile giriş yapar. Supabase auth.users tablosunda
        crypt() doğrulaması yapılır. Başarılı girişte profil UUID'si döner.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: E-posta veya şifre hatalı
        "500":
          description: Giriş yapılamadı

  # ── Profiller ──────────────────────────────────────
  /profiles:
    get:
      summary: Tüm profilleri listele
      tags: [Profiller]
      responses:
        "200":
          description: Profil listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      summary: Yeni profil oluştur
      tags: [Profiller]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileRequest"
      responses:
        "201":
          description: Profil oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Geçersiz rol veya yönetici profili oluşturulamaz
        "422":
          description: Doğrulama hatası

  /profiles/{id}:
    get:
      summary: ID'ye göre profil getir
      tags: [Profiller]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Profil bilgisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profil bulunamadı

  # ── Öğrenciler ─────────────────────────────────────
  /students:
    get:
      summary: Tüm öğrencileri listele
      tags: [Öğrenciler]
      responses:
        "200":
          description: Öğrenci listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      summary: Yeni öğrenci oluştur
      tags: [Öğrenciler]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Öğrenci oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Geçersiz şehir veya departman
        "403":
          description: Kendi hesabınızı düzenleyebilirsiniz

  /students/{profile_id}:
    get:
      summary: Profile ID'ye göre öğrenci getir
      tags: [Öğrenciler]
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Öğrenci bilgisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Öğrenci bulunamadı
    put:
      summary: Öğrenci profilini güncelle
      description: |
        Öğrenci kendi profil bilgilerini güncelleyebilir.
        Varolan kayıt güncellenir; kayıt yoksa INSERT yapılır.
        Gönderilmeyen alanlar mevcut değerini korur.
      tags: [Öğrenciler]
      security:
        - BearerAuth: []
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Öğrenci başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "403":
          description: Kendi hesabınızı düzenleyebilirsiniz
        "404":
          description: Öğrenci bulunamadı

  # ── Donorlar ───────────────────────────────────────
  /donors:
    get:
      summary: Tüm donorları listele
      tags: [Donorlar]
      responses:
        "200":
          description: Donor listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donor"

  /donors/{profile_id}:
    get:
      summary: Profile ID'ye göre donor getir
      tags: [Donorlar]
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Donor bilgisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "404":
          description: Donor bulunamadı

  /donors/{profile_id}/verify:
    post:
      summary: Donoru yönetici onayı ile doğrula
      tags: [Donorlar]
      security:
        - BearerAuth: []
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Donor başarıyla doğrulandı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "403":
          description: Sadece yöneticiler burs verenleri onaylayabilir
        "404":
          description: Donor bulunamadı

  # ── Burslar ────────────────────────────────────────
  /scholarships:
    get:
      summary: Tüm bursları listele
      tags: [Burslar]
      responses:
        "200":
          description: Burs listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scholarship"
    post:
      summary: Yeni burs oluştur
      tags: [Burslar]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScholarshipRequest"
      responses:
        "201":
          description: Burs oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scholarship"
        "400":
          description: Geçersiz şehir, departman veya gelir düzeyi
        "403":
          description: Sadece burs verenler burs oluşturabilir

  /scholarships/{id}:
    get:
      summary: ID'ye göre burs getir
      tags: [Burslar]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Burs bilgisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scholarship"
        "404":
          description: Burs bulunamadı

  # ── Eşleştirme ─────────────────────────────────────
  /match/{student_id}:
    post:
      summary: Öğrenciyi aktif burslarla eşleştir
      tags: [Eşleştirme]
      parameters:
        - name: student_id
          in: path
          required: true
          description: Öğrencinin profile_id'si
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Skorlanmış eşleşme sonuçları (büyükten küçüğe)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchResult"
        "404":
          description: Öğrenci bulunamadı (boş dizi döner)

  # ── Referans Tabloları ─────────────────────────────
  /cities:
    get:
      summary: Tüm Türkiye şehirlerini listele (alfabetik)
      tags: [Referanslar]
      responses:
        "200":
          description: Şehir listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamedItem"

  /departments:
    get:
      summary: Tüm departmanları listele (alfabetik)
      tags: [Referanslar]
      responses:
        "200":
          description: Departman listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamedItem"

  /departments/{name}:
    delete:
      summary: Departman sil (sadece yönetici)
      description: |
        Departmanı ve ona bağlı öğrenci kayıtlarını siler,
        ayrıca bursların target_departments array'inden kaldırır.
      tags: [Referanslar]
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Departman başarıyla silindi
          content:
            application/json:
              schema:
                type: string
                example: "Department 'asd' deleted"
        "401":
          description: Geçersiz veya eksik token
        "403":
          description: Sadece yöneticiler departman silebilir
        "404":
          description: Departman bulunamadı

  /income-levels:
    get:
      summary: Gelir düzeylerini listele
      tags: [Referanslar]
      responses:
        "200":
          description: Gelir düzeyi listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamedItem"

  /user-roles:
    get:
      summary: Kullanıcı rollerini listele
      tags: [Referanslar]
      responses:
        "200":
          description: Rol listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamedItem"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Authorization: Bearer `<uuid>` — profile UUID returned by
        `/register` or `/login`. No JWT, no expiry. The UUID must
        exist in the `profiles` table.
  schemas:
    # ── Temel Tipler ────────────────────────────────
    UserRole:
      type: string
      enum: [student, donor, admin]
      description: Kullanıcı rolü

    IncomeLevel:
      type: string
      enum: [low, medium, high]
      description: Gelir düzeyi

    # ── Nesneler ─────────────────────────────────────
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/UserRole"
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Student:
      type: object
      properties:
        profile_id:
          type: string
          format: uuid
        gpa:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 4
        city:
          type: string
          description: Türkiye şehri
        department:
          type: string
        income_status:
          $ref: "#/components/schemas/IncomeLevel"
        about:
          type: string
          nullable: true
          description: Öğrencinin kendisi hakkında yazdığı metin
        created_at:
          type: string
          format: date-time
          nullable: true

    Donor:
      type: object
      properties:
        profile_id:
          type: string
          format: uuid
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true

    Scholarship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        donor_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        quota:
          type: integer
        is_active:
          type: boolean
          nullable: true
        min_gpa:
          type: number
          format: float
          nullable: true
        target_cities:
          type: array
          items:
            type: string
          description: Boş array = tüm şehirler
        target_departments:
          type: array
          items:
            type: string
          description: Boş array = tüm departmanlar
        target_income_levels:
          type: array
          items:
            $ref: "#/components/schemas/IncomeLevel"
          description: Boş array = tüm gelir düzeyleri
        created_at:
          type: string
          format: date-time
          nullable: true

    MatchResult:
      type: object
      properties:
        scholarship_id:
          type: string
          format: uuid
        score:
          type: number
          format: float

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: ogrenci@ornek.com
        password:
          type: string
          minLength: 6
          example: GucluSifre123

    LoginResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Kullanıcının profil ID'si
        role:
          $ref: "#/components/schemas/UserRole"
        message:
          type: string
          example: "Giriş başarılı"

    NamedItem:
      type: object
      properties:
        name:
          type: string

    # ── İstek Gövdeleri ─────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: ogrenci@ornek.com
        password:
          type: string
          minLength: 6
          example: "GucluSifre123"
        role:
          $ref: "#/components/schemas/UserRole"
        city:
          type: string
          description: "Rol 'student' ise kayıt anında girilebilir, sonradan da eklenebilir."
          example: İstanbul
        department:
          type: string
          description: "Rol 'student' ise kayıt anında girilebilir, sonradan da eklenebilir."
          example: Bilgisayar Mühendisliği
        income_status:
          $ref: "#/components/schemas/IncomeLevel"
          description: "Rol 'student' ise kayıt anında girilebilir, sonradan da eklenebilir."
        gpa:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 4
          description: "Not ortalaması (opsiyonel)"

    RegisterResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Oluşturulan kullanıcının ID'si
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        message:
          type: string
          example: "Kayıt başarılı"

    CreateProfileRequest:
      type: object
      required: [id, role]
      properties:
        id:
          type: string
          format: uuid
          description: Auth kullanıcı ID'si ile aynı olmalı
        role:
          $ref: "#/components/schemas/UserRole"

    CreateStudentRequest:
      type: object
      required: [profile_id, city, department, income_status]
      properties:
        profile_id:
          type: string
          format: uuid
        gpa:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 4
        city:
          type: string
          description: Geçerli bir Türkiye şehri
        department:
          type: string
          description: Mevcut bir departman (FK)
        income_status:
          $ref: "#/components/schemas/IncomeLevel"

    CreateScholarshipRequest:
      type: object
      required: [title]
      properties:
        donor_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        quota:
          type: integer
          nullable: true
          default: 1
        is_active:
          type: boolean
          nullable: true
          default: true
        min_gpa:
          type: number
          format: float
          nullable: true
        target_cities:
          type: array
          items:
            type: string
          nullable: true
          description: Boş veya null = tüm şehirler. Yeni şehirler otomatik eklenir.
        target_departments:
          type: array
          items:
            type: string
          nullable: true
          description: Boş veya null = tüm departmanlar
        target_income_levels:
          type: array
          items:
            $ref: "#/components/schemas/IncomeLevel"
          nullable: true
          description: Boş veya null = tüm gelir düzeyleri

    UpdateStudentRequest:
      type: object
      properties:
        gpa:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 4
          description: Not ortalaması (gönderilmezse değişmez)
        city:
          type: string
          description: "Türkiye şehri (yeni kayıtta zorunlu, sonraki güncellemelerde gönderilmezse değişmez)"
        department:
          type: string
          description: "Departman (yeni kayıtta zorunlu, sonraki güncellemelerde gönderilmezse değişmez)"
        income_status:
          $ref: "#/components/schemas/IncomeLevel"
          description: "Gelir düzeyi (yeni kayıtta zorunlu, sonraki güncellemelerde gönderilmezse değişmez)"
        about:
          type: string
          nullable: true
          description: "Hakkında metni (gönderilmezse değişmez)"
